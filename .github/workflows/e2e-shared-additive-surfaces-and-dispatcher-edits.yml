name: "E2E — Shared Additive Surfaces and Dispatcher Edits"

on:
  pull_request:
    branches:
      - feature/memory
      - "ws/code-intelligence-AST-PARSER-FOR-ADDIT/**"
    paths:
      - "services/agent-memory/internal/repoindexer/ast/**"
      - "services/agent-memory/test/e2e/code-intelligence-AST-PARSER-FOR-ADDIT/**"
      - "tests/e2e/phase-1-shared-additive-surfaces/**"
      - ".github/workflows/e2e-shared-additive-surfaces-and-dispatcher-edits.yml"
  push:
    branches:
      - feature/memory
      - "ws/code-intelligence-AST-PARSER-FOR-ADDIT/**"
    paths:
      - "services/agent-memory/internal/repoindexer/ast/**"
      - "services/agent-memory/test/e2e/code-intelligence-AST-PARSER-FOR-ADDIT/**"
      - "tests/e2e/phase-1-shared-additive-surfaces/**"
      - ".github/workflows/e2e-shared-additive-surfaces-and-dispatcher-edits.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-shared-additive-surfaces-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mergelangmeta-helper-and-writer-attrs-integration:
    name: "mergelangmeta-helper-and-writer-attrs-integration"
    runs-on: ubuntu-latest
    env:
      COMPOSE_FILE: tests/e2e/phase-1-shared-additive-surfaces/docker-compose.yml
      AGENT_MEMORY_PG_URL: "postgres://agent_memory:agent_memory@localhost:5432/agent_memory?sslmode=disable"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/agent-memory/go.mod
          cache: true

      - name: Start compose stack (postgres with partman)
        run: docker compose -f $COMPOSE_FILE up -d --build

      - name: Wait for postgres
        run: |
          set -euo pipefail
          deadline=$(( $(date +%s) + 90 ))
          while :; do
            status=$(docker compose -f $COMPOSE_FILE ps --format json \
              | jq -r 'select(.Service=="postgres") | .Health // .State' 2>/dev/null || echo "unknown")
            echo "  postgres -> $status"
            if [ "$status" = "healthy" ]; then echo "Postgres ready"; break; fi
            if [ "$(date +%s)" -ge "$deadline" ]; then
              echo "::error::Postgres did not become healthy within 90s"
              docker compose -f $COMPOSE_FILE logs --tail=100
              exit 1
            fi
            sleep 3
          done

      - name: Download Go dependencies
        working-directory: services/agent-memory
        run: go mod download

      - name: Run E2E scenarios
        working-directory: services/agent-memory
        run: |
          go test -tags e2e -v -count=1 -timeout 120s \
            -run TestE2E_shared_additive_surfaces_and_dispatcher_edits_mergelangmeta_helper_and_writer_attrs_integration \
            ./test/e2e/code-intelligence-AST-PARSER-FOR-ADDIT/...

      - name: Tear down compose stack
        if: always()
        run: docker compose -f $COMPOSE_FILE down -v