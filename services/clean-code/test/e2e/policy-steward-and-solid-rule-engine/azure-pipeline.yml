trigger: none

pr:
  branches:
    include:
      - main
  paths:
    include:
      - services/clean-code/**

pool:
  vmImage: ubuntu-latest

variables:
  GO_VERSION: "1.25.1"
  COMPOSE_FILE: tests/e2e/phase-05-policy-engine/docker-compose.yml

stages:
  - stage: e2e_decoupled_functional_areas_rule_pack
    displayName: "E2E – Decoupled Functional Areas Rule Pack"
    jobs:
      - job: run_e2e
        displayName: "Run godog E2E tests"
        timeoutInMinutes: 20
        steps:
          - task: GoTool@0
            inputs:
              version: $(GO_VERSION)
            displayName: "Install Go $(GO_VERSION)"

          - script: |
              docker compose -f $(COMPOSE_FILE) up -d --build
            displayName: "Start compose services"
            workingDirectory: $(Build.SourcesDirectory)

          - script: |
              make migrate-up
              make seed-phase-05
            displayName: "Bootstrap: migrate and seed"
            workingDirectory: $(Build.SourcesDirectory)

          - script: |
              # No external secrets — compose exports all URLs via mapped ports.
              # Use ##vso[task.setvariable] so these env vars persist into subsequent
              # steps, matching how the GitHub Actions workflow writes to $GITHUB_ENV.
              KMS_PORT=$(docker compose -f $(COMPOSE_FILE) port kms-mock 8080 | cut -d: -f2)
              PG_PORT=$(docker compose -f $(COMPOSE_FILE) port postgres 5432 | cut -d: -f2)
              STEWARD_PORT=$(docker compose -f $(COMPOSE_FILE) port policy-steward 8080 | cut -d: -f2)
              RULE_ENGINE_PORT=$(docker compose -f $(COMPOSE_FILE) port rule-engine 8080 | cut -d: -f2)
              OTEL_PORT=$(docker compose -f $(COMPOSE_FILE) port otel-collector 4317 | cut -d: -f2)
              echo "##vso[task.setvariable variable=CLEAN_CODE_KMS_URL]http://localhost:${KMS_PORT}"
              echo "##vso[task.setvariable variable=CLEAN_CODE_PG_URL]postgres://postgres:postgres@localhost:${PG_PORT}/clean_code?sslmode=disable"
              echo "##vso[task.setvariable variable=CLEAN_CODE_POLICY_STEWARD_URL]http://localhost:${STEWARD_PORT}"
              echo "##vso[task.setvariable variable=CLEAN_CODE_RULE_ENGINE_URL]http://localhost:${RULE_ENGINE_PORT}"
              echo "##vso[task.setvariable variable=CLEAN_CODE_OTEL_ENDPOINT]http://localhost:${OTEL_PORT}"
            displayName: "Export compose-provided env vars"
            workingDirectory: $(Build.SourcesDirectory)

          - script: |
              go test -tags e2e -v -count=1 ./test/e2e/code-intelligence-CLEAN-CODE/... \
                -run TestE2E_policy_steward_and_solid_rule_engine_decoupled_functional_areas_rule_pack
            displayName: "Run E2E tests"
            workingDirectory: $(Build.SourcesDirectory)/services/clean-code

          - script: |
              docker compose -f $(COMPOSE_FILE) down -v --remove-orphans
            displayName: "Tear down compose services"
            workingDirectory: $(Build.SourcesDirectory)
            condition: always()
