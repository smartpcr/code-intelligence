# clean-code Stage 5.5 -- Decoupling / Cycle-Member rule pack
#
# Architecture references:
#   - Sec 1.3 "Coupling between objects" (goal 3): dependency
#     cycles between modules are the most acute form of
#     coupling; the `cycle_member` metric flags any module that
#     participates in a strongly-connected component of the
#     import graph.
#
# Marker requirement: the leading `# clean-code Stage` comment
# is asserted by `internal/cli/devpolicy/embed_test.go` to
# detect stale/wrong embedded bytes, so do NOT remove it.

pack_id: "decoupling-cycles"
version: "1.0"
rules:
  - rule_id: "cycle-member-violation"
    metric_kind: "cycle_member"
    scope_kind: "module"
    predicate_dsl: "metric_kind == 'cycle_member' AND value >= 1"
    description: "Module participates in a dependency cycle"
    suggested_refactor: "Break the cycle by inverting the dependency or extracting a shared interface"