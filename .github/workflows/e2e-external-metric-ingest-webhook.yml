name: E2E – External Metric Ingest Webhook

on:
  pull_request:
    branches: [main]
    paths:
      - "services/clean-code/**"
  workflow_dispatch:

permissions:
  contents: read

env:
  GO_VERSION: "1.25.1"
  COMPOSE_FILE: tests/e2e/phase-04-webhook/docker-compose.yml

jobs:
  e2e-ingest-defects-verb-store-only:
    name: "E2E – Ingest Defects Verb Store Only"
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: services/clean-code/go.sum

      - name: Verify compose file exists
        run: |
          if [ ! -f "${{ env.COMPOSE_FILE }}" ]; then
            echo "::error::Compose file not found: ${{ env.COMPOSE_FILE }}"
            exit 1
          fi

      - name: Start compose services
        run: docker compose -f ${{ env.COMPOSE_FILE }} up -d --build

      - name: Export compose-provided env vars
        run: |
          set -euo pipefail
          # Generate HMAC secret FIRST so compose can inject it.
          export CLEAN_CODE_WEBHOOK_HMAC_SECRET="$(openssl rand -hex 32)"
          # Start compose — secret is already exported.
          docker compose -f ${{ env.COMPOSE_FILE }} up -d --build
          # Discover dynamic ports.
          PG_PORT=$(docker compose -f ${{ env.COMPOSE_FILE }} port postgres 5432 | cut -d: -f2)
          WEBHOOK_PORT=$(docker compose -f ${{ env.COMPOSE_FILE }} port webhook 8080 | cut -d: -f2)
          OTEL_PORT=$(docker compose -f ${{ env.COMPOSE_FILE }} port otel-collector 4317 | cut -d: -f2)
          export CLEAN_CODE_PG_URL="postgres://postgres:postgres@localhost:${PG_PORT}/clean_code?sslmode=disable"
          export CLEAN_CODE_WEBHOOK_URL="http://localhost:${WEBHOOK_PORT}"
          export CLEAN_CODE_OTEL_ENDPOINT="http://localhost:${OTEL_PORT}"
          # Bootstrap.
          make migrate-up
          make seed-repo-d
          # Run tests.
          cd services/clean-code
          go test -tags e2e -v -count=1 ./test/e2e/code-intelligence-CLEAN-CODE/... \
            -run TestE2E_external_metric_ingest_webhook_ingest_defects_verb_store_only

      - name: Tear down compose services
        if: always()
        run: docker compose -f ${{ env.COMPOSE_FILE }} down -v --remove-orphans

  e2e-ingest-coverage-verb-cobertura-parser:
    name: "E2E – Ingest Coverage Verb Cobertura Parser"
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: services/clean-code/go.sum

      - name: Verify compose file exists
        run: |
          if [ ! -f "${{ env.COMPOSE_FILE }}" ]; then
            echo "::error::Compose file not found: ${{ env.COMPOSE_FILE }}"
            exit 1
          fi

      - name: Generate HMAC secret, start compose, bootstrap, run E2E
        run: |
          set -euo pipefail
          # Generate HMAC secret FIRST so compose can inject it.
          export CLEAN_CODE_WEBHOOK_HMAC_SECRET="$(openssl rand -hex 32)"
          # Start compose — secret is already exported.
          docker compose -f ${{ env.COMPOSE_FILE }} up -d --build
          # Discover dynamic ports.
          PG_PORT=$(docker compose -f ${{ env.COMPOSE_FILE }} port postgres 5432 | cut -d: -f2)
          WEBHOOK_PORT=$(docker compose -f ${{ env.COMPOSE_FILE }} port webhook 8080 | cut -d: -f2)
          OTEL_PORT=$(docker compose -f ${{ env.COMPOSE_FILE }} port otel-collector 4317 | cut -d: -f2)
          export CLEAN_CODE_PG_URL="postgres://postgres:postgres@localhost:${PG_PORT}/clean_code?sslmode=disable"
          export CLEAN_CODE_WEBHOOK_URL="http://localhost:${WEBHOOK_PORT}"
          export CLEAN_CODE_OTEL_ENDPOINT="http://localhost:${OTEL_PORT}"
          # Bootstrap.
          make migrate-up
          make seed-repo-d
          # Run tests.
          cd services/clean-code
          go test -tags e2e -v -count=1 ./test/e2e/code-intelligence-CLEAN-CODE/... \
            -run TestE2E_external_metric_ingest_webhook_ingest_coverage_verb_cobertura_parser

      - name: Tear down compose services
        if: always()
        run: docker compose -f ${{ env.COMPOSE_FILE }} down -v --remove-orphans

  e2e-ingest-test-balance-verb:
    name: "E2E – Ingest test_balance Verb"
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: services/clean-code/go.sum

      - name: Generate ephemeral HMAC secret
        run: |
          echo "CLEAN_CODE_WEBHOOK_HMAC_SECRET=$(openssl rand -hex 32)" >> "$GITHUB_ENV"

      - name: Start compose services
        run: docker compose -f ${{ env.COMPOSE_FILE }} up -d --build

      - name: Export compose-provided env vars
        run: |
          PG_PORT=$(docker compose -f ${{ env.COMPOSE_FILE }} port postgres 5432 | cut -d: -f2)
          WEBHOOK_PORT=$(docker compose -f ${{ env.COMPOSE_FILE }} port webhook 8080 | cut -d: -f2)
          OTEL_PORT=$(docker compose -f ${{ env.COMPOSE_FILE }} port otel-collector 4317 | cut -d: -f2)
          echo "CLEAN_CODE_PG_URL=postgres://postgres:postgres@localhost:${PG_PORT}/clean_code?sslmode=disable" >> "$GITHUB_ENV"
          echo "CLEAN_CODE_WEBHOOK_URL=http://localhost:${WEBHOOK_PORT}" >> "$GITHUB_ENV"
          echo "CLEAN_CODE_OTEL_ENDPOINT=http://localhost:${OTEL_PORT}" >> "$GITHUB_ENV"

      - name: Bootstrap – migrate and seed
        run: |
          make migrate-up CLEAN_CODE_PG_URL="${CLEAN_CODE_PG_URL}"
          make seed-repo-d CLEAN_CODE_PG_URL="${CLEAN_CODE_PG_URL}"

      - name: Run E2E tests
        working-directory: services/clean-code
        run: |
          go test -tags e2e -v -count=1 ./test/e2e/code-intelligence-CLEAN-CODE/... \
            -run TestE2E_external_metric_ingest_webhook_ingest_test_balance_verb

      - name: Tear down compose services
        if: always()
        run: docker compose -f ${{ env.COMPOSE_FILE }} down -v --remove-orphans

  e2e-ingest-churn-verb-feeds-materialiser:
    name: "E2E – Ingest churn Verb feeds materialiser"
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: services/clean-code/go.sum

      - name: Verify compose file exists
        run: |
          if [ ! -f "${{ env.COMPOSE_FILE }}" ]; then
            echo "::error::Compose file not found: ${{ env.COMPOSE_FILE }}"
            exit 1
          fi

      - name: Generate HMAC secret, start compose, bootstrap, run E2E
        run: |
          set -euo pipefail
          # Generate HMAC secret + signing key id FIRST so compose can inject
          # them. The churn job exercises the PRODUCTION external-ingest
          # Router (Stage-6 secret-resolver path), so both
          # CLEAN_CODE_ENABLE_EXTERNAL_INGEST_WEBHOOK and
          # CLEAN_CODE_WEBHOOK_SIGNING_KEY_ID MUST be set BEFORE compose
          # boots the webhook container -- config.Load() enforces the
          # interlock at startup (internal/config/config.go:660-672).
          export CLEAN_CODE_WEBHOOK_HMAC_SECRET="$(openssl rand -hex 32)"
          export CLEAN_CODE_ENABLE_EXTERNAL_INGEST_WEBHOOK="true"
          export CLEAN_CODE_WEBHOOK_SIGNING_KEY_ID="kv-ci-churn-2026-q2"
          # Start compose — secret + key id are already exported.
          docker compose -f ${{ env.COMPOSE_FILE }} up -d --build
          # Discover dynamic ports.
          PG_PORT=$(docker compose -f ${{ env.COMPOSE_FILE }} port postgres 5432 | cut -d: -f2)
          WEBHOOK_PORT=$(docker compose -f ${{ env.COMPOSE_FILE }} port webhook 8080 | cut -d: -f2)
          OTEL_PORT=$(docker compose -f ${{ env.COMPOSE_FILE }} port otel-collector 4317 | cut -d: -f2)
          export CLEAN_CODE_PG_URL="postgres://postgres:postgres@localhost:${PG_PORT}/clean_code?sslmode=disable"
          export CLEAN_CODE_WEBHOOK_URL="http://localhost:${WEBHOOK_PORT}"
          export CLEAN_CODE_OTEL_ENDPOINT="http://localhost:${OTEL_PORT}"
          # Bootstrap.
          make migrate-up
          make seed-repo-d
          # Run tests.
          cd services/clean-code
          go test -tags e2e -v -count=1 ./test/e2e/code-intelligence-CLEAN-CODE/... \
            -run TestE2E_external_metric_ingest_webhook_ingest_churn_verb_feeds_materialiser

      - name: Tear down compose services
        if: always()
        run: docker compose -f ${{ env.COMPOSE_FILE }} down -v --remove-orphans