pack_id: "solid-srp"
version: "1.0"
rules:
  - rule_id: "srp-class-cohesion"
    metric_kind: "lcom4"
    scope_kind: "class"
    predicate_dsl: "metric_kind == 'lcom4' AND scope_kind == 'class' AND value >= 10"
    description: "Class has low cohesion (LCOM4 >= 10), violating Single Responsibility Principle"
    suggested_refactor: "Split the class along the cohesion boundaries (SRP)"