name: "E2E – Audit WAL & Reliability Hardening"

on:
  push:
    branches:
      - feature/clean-code
      - "ws/code-intelligence-CLEAN-CODE/**"
    paths:
      - "services/clean-code/**"
  pull_request:
    branches:
      - feature/clean-code
    paths:
      - "services/clean-code/**"
  workflow_dispatch:

concurrency:
  group: e2e-audit-wal-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-audit-wal-reconciler:
    name: "Audit WAL Reconciler Replay Only"
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: services/clean-code/go.sum

      - name: Start compose services
        run: |
          docker compose -f tests/e2e/phase-09-audit-wal/docker-compose.yml up -d --build
          sleep 10

      - name: Bootstrap DB
        working-directory: services/clean-code
        run: |
          make migrate-up
          make seed-phase-09

      - name: Run E2E tests
        working-directory: services/clean-code
        env:
          CLEAN_CODE_PG_URL: postgres://clean_code_admin:e2e_test_password@localhost:5432/clean_code?sslmode=disable
          CLEAN_CODE_OTEL_ENDPOINT: http://localhost:4317
        run: |
          go test -tags e2e -v -count=1 -timeout 120s \
            ./test/e2e/code-intelligence-CLEAN-CODE/...

      - name: Collect compose logs
        if: always()
        run: |
          docker compose -f tests/e2e/phase-09-audit-wal/docker-compose.yml logs --tail=200

      - name: Tear down
        if: always()
        run: |
          docker compose -f tests/e2e/phase-09-audit-wal/docker-compose.yml down -v