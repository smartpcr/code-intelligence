# golangci-lint config for services/clean-code.
#
# Stage 1.1 goal: `make lint` must exit 0 with zero findings on the
# empty tree, so we keep this config conservative -- enable the
# default linter set plus a small, opinionated extension. New
# linters MUST be added in their own PR with a clean-tree run.
#
# Tested against golangci-lint v1.61.x. CI pins the binary in
# .github/workflows/clean-code-ci.yml.

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

output:
  formats:
    - format: colored-line-number
  sort-results: true
  print-issued-lines: true
  print-linter-name: true

linters:
  disable-all: true
  enable:
    # built-in golangci-lint default set
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    # opinionated extensions (low-noise, high-signal)
    - gofmt
    - goimports
    - misspell
    - revive
    # Custom import guard for the CLI package trees
    # (tech-spec REFACTOR-GUIDE Sec 8.10, rule
    # `no-production-sql-import`). Scoped to
    # `cmd/cleanc/...` and `internal/cli/...` via
    # the path-except exclude rule below.
    - forbidigo

linters-settings:
  gofmt:
    simplify: true
  goimports:
    local-prefixes: github.com/smartpcr/code-intelligence/services/clean-code
  revive:
    severity: warning
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: context-keys-type
      - name: dot-imports
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: exported
      - name: increment-decrement
      - name: var-naming
      - name: var-declaration
      - name: package-comments
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: unexported-return
      - name: indent-error-flow
      - name: errorf
      - name: empty-block
      - name: superfluous-else
      - name: unused-parameter
      - name: unreachable-code
      - name: redefines-builtin-id

  # ---------------------------------------------------------------
  # `no-production-sql-import` (tech-spec REFACTOR-GUIDE Sec 8.10)
  #
  # The `cmd/cleanc/...` and `internal/cli/...` package trees are
  # the CLI composition root for `cleanc` and MUST NOT depend on
  # any production SQL store. Specifically, they MUST NOT import
  # the stdlib `database/sql` package, nor any in-tree package
  # whose import path ends in `_sql_store` / `.sql_store` (the
  # repo's convention for the PostgreSQL-backed reader/writer
  # adapters under `internal/policy/{keys,steward}/sql_store.go`
  # and `internal/rule_engine/sql_store.go`). The Sec 4.6
  # in-memory readers/writers are the only allowed reader/writer
  # constructors at the CLI composition root.
  #
  # forbidigo with `analyze-types: true` matches against the
  # fully-qualified package symbol (e.g. `database/sql.DB`,
  # `database/sql.Open`), so a forbidden symbol triggers the
  # rule wherever it is used, which implies the import was
  # made. Combined with the `path-except` exclusion below,
  # the rule only fires inside the CLI tree.
  forbidigo:
    analyze-types: true
    exclude-godoc-examples: true
    forbid:
      - p: '^database/sql\..*$'
        msg: >-
          no-production-sql-import: cmd/cleanc/... and
          internal/cli/... MUST NOT import database/sql.
          Use the in-memory readers/writers from
          internal/rule_engine/inmem_store.go and
          internal/refactor/planner.go (Sec 4.6).
      - p: '^.*[_./]sql_store\..*$'
        msg: >-
          no-production-sql-import: cmd/cleanc/... and
          internal/cli/... MUST NOT import any *_sql_store
          adapter. The CLI composition root binds to the
          in-memory variants only (tech-spec Sec 8.10).

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    # `no-production-sql-import` is scoped to the CLI composition
    # root only (tech-spec REFACTOR-GUIDE Sec 8.10). Suppress the
    # `forbidigo` linter for every file OUTSIDE `cmd/cleanc/` and
    # `internal/cli/` so the production services (which legitimately
    # use database/sql via the *_sql_store adapters) keep linting
    # clean. golangci-lint resolves `path` relative to the run dir
    # (services/clean-code), so the regex anchors on that root.
    - linters:
        - forbidigo
      path-except: '(^|/)cmd/cleanc/|(^|/)internal/cli/'
