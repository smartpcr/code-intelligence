name: E2E – Audit WAL and Reliability Hardening

on:
  pull_request:
    branches: [main]
    paths:
      - "services/clean-code/**"
  workflow_dispatch:

permissions:
  contents: read

env:
  GO_VERSION: "1.25.1"
  COMPOSE_FILE: services/clean-code/deploy/local/docker-compose.yml

jobs:
  e2e-audit-wal-frame-writer:
    name: "E2E – Audit WAL Frame Writer"
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: services/clean-code/go.sum

      - name: Start compose services
        run: docker compose -f ${{ env.COMPOSE_FILE }} up -d --build

      - name: Export compose-provided env vars
        run: |
          PG_PORT=$(docker compose -f ${{ env.COMPOSE_FILE }} port postgres 5432 | cut -d: -f2)
          EVAL_PORT=$(docker compose -f ${{ env.COMPOSE_FILE }} port evaluator 8080 | cut -d: -f2)
          OTEL_PORT=$(docker compose -f ${{ env.COMPOSE_FILE }} port otel-collector 4317 | cut -d: -f2)
          echo "CLEAN_CODE_PG_URL=postgres://postgres:postgres@localhost:${PG_PORT}/clean_code?sslmode=disable" >> "$GITHUB_ENV"
          echo "CLEAN_CODE_EVALUATOR_URL=http://localhost:${EVAL_PORT}" >> "$GITHUB_ENV"
          echo "CLEAN_CODE_OTEL_ENDPOINT=http://localhost:${OTEL_PORT}" >> "$GITHUB_ENV"
          echo "CLEAN_CODE_REPO_ROOT=${{ github.workspace }}/services/clean-code" >> "$GITHUB_ENV"

      - name: Bootstrap – migrate and seed
        run: |
          make migrate-up CLEAN_CODE_PG_URL="${CLEAN_CODE_PG_URL}"
          make seed-phase-09 CLEAN_CODE_PG_URL="${CLEAN_CODE_PG_URL}"

      - name: Run E2E tests
        working-directory: services/clean-code
        run: |
          go test -tags e2e -v -count=1 ./test/e2e/code-intelligence-CLEAN-CODE/... \
            -run TestE2E_audit_wal_and_reliability_hardening_audit_wal_frame_writer

      - name: Tear down compose services
        if: always()
        run: docker compose -f ${{ env.COMPOSE_FILE }} down -v --remove-orphans