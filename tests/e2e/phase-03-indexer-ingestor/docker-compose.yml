# docker-compose for E2E phase-03 (Repo Indexer & Metric Ingestor)
# Usage: docker compose -f tests/e2e/phase-03-indexer-ingestor/docker-compose.yml up -d --build

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: clean_code
    ports:
      - "5432"
    volumes:
      - ../../../services/clean-code/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
      - ./fixtures/seed.sql:/docker-entrypoint-initdb.d/002_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 5s
      retries: 10

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.100.0
    command: ["--config=/etc/otel/config.yaml"]
    ports:
      - "4317"
    volumes:
      - ./otel-config.yaml:/etc/otel/config.yaml:ro

  indexer:
    build:
      context: ../../../services/clean-code
      dockerfile: Dockerfile
      args:
        SERVICE: clean-code-indexer
    environment:
      CLEAN_CODE_PG_URL: "postgres://postgres:postgres@postgres:5432/clean_code?sslmode=disable"
      CLEAN_CODE_OTEL_ENDPOINT: "otel-collector:4317"
    depends_on:
      postgres:
        condition: service_healthy

  ingestor:
    build:
      context: ../../../services/clean-code
      dockerfile: Dockerfile
      args:
        SERVICE: clean-code-metric-ingestor
        ROLE: clean_code_metric_ingestor
    environment:
      CLEAN_CODE_PG_URL: "postgres://postgres:postgres@postgres:5432/clean_code?sslmode=disable"
      CLEAN_CODE_OTEL_ENDPOINT: "otel-collector:4317"
    ports:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy