name: "E2E — Graphsink Storage Abstraction"

on:
  pull_request:
    branches:
      - feature/scanner
      - "ws/code-intelligence-REPO-SCANNER/**"
    paths:
      - "services/agent-memory/internal/graphsink/**"
      - "services/agent-memory/test/e2e/code-intelligence-REPO-SCANNER/graphsink_storage_abstraction_*"
      - "tests/e2e/phase-3-graphsink-storage-abstraction/**"
      - ".github/workflows/e2e-graphsink-storage-abstraction.yml"
  push:
    branches:
      - feature/scanner
      - "ws/code-intelligence-REPO-SCANNER/**"
    paths:
      - "services/agent-memory/internal/graphsink/**"
      - "services/agent-memory/test/e2e/code-intelligence-REPO-SCANNER/graphsink_storage_abstraction_*"
      - "tests/e2e/phase-3-graphsink-storage-abstraction/**"
      - ".github/workflows/e2e-graphsink-storage-abstraction.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-graphsink-storage-abstraction-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sink-interface-skeleton:
    name: "sink-interface-skeleton"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/agent-memory/go.mod
          cache: true

      - name: Download Go dependencies
        working-directory: services/agent-memory
        run: go mod download

      - name: Run E2E scenarios
        working-directory: services/agent-memory
        run: |
          go test -tags e2e -v -count=1 -timeout 120s \
            -run TestE2E_graphsink_storage_abstraction_sink_interface_skeleton \
            ./test/e2e/code-intelligence-REPO-SCANNER/...

  repoid-extension-to-repoinput:
    name: "repoid-extension-to-repoinput"
    runs-on: ubuntu-latest
    env:
      COMPOSE_FILE: tests/e2e/phase-3-graphsink-storage-abstraction/docker-compose.yml
      AGENT_MEMORY_PG_URL: "postgres://agent_memory:agent_memory@localhost:5432/agent_memory?sslmode=disable"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/agent-memory/go.mod
          cache: true

      - name: Start compose stack (postgres)
        run: docker compose -f $COMPOSE_FILE up -d

      - name: Wait for postgres
        run: |
          deadline=$(( $(date +%s) + 90 ))
          while :; do
            status=$(docker compose -f $COMPOSE_FILE ps --format json \
              | jq -r 'select(.Service=="postgres") | .Health // .State' 2>/dev/null || echo "unknown")
            echo "  postgres -> $status"
            if [ "$status" = "healthy" ]; then echo "Postgres ready"; break; fi
            if [ "$(date +%s)" -ge "$deadline" ]; then
              echo "::error::Postgres did not become healthy within 90s"
              docker compose -f $COMPOSE_FILE logs --tail=100
              exit 1
            fi
            sleep 3
          done

      - name: Download Go dependencies
        working-directory: services/agent-memory
        run: go mod download

      - name: Run E2E scenarios
        working-directory: services/agent-memory
        env:
          AGENT_MEMORY_PG_URL: ${{ env.AGENT_MEMORY_PG_URL }}
        run: |
          go test -tags e2e -v -count=1 -timeout 120s \
            -run TestE2E_graphsink_storage_abstraction_repoid_extension_to_repoinput \
            ./test/e2e/code-intelligence-REPO-SCANNER/...

      - name: Tear down compose stack
        if: always()
        run: docker compose -f $COMPOSE_FILE down -v

  memory-sink-and-json-export:
    name: "memory-sink-and-json-export"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/agent-memory/go.mod
          cache: true

      - name: Download Go dependencies
        working-directory: services/agent-memory
        run: go mod download

      - name: Run E2E scenarios
        working-directory: services/agent-memory
        run: |
          go test -tags e2e -v -count=1 -timeout 120s \
            -run TestE2E_graphsink_storage_abstraction_memory_sink_and_json_export \
            ./test/e2e/code-intelligence-REPO-SCANNER/...

  sqlite-sink-backend:
    name: "sqlite-sink-backend"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/agent-memory/go.mod
          cache: true

      - name: Download Go dependencies
        working-directory: services/agent-memory
        run: go mod download

      - name: Run E2E scenarios
        working-directory: services/agent-memory
        env:
          CGO_ENABLED: "1"
        run: |
          go test -tags e2e -v -count=1 -timeout 120s \
            -run TestE2E_graphsink_storage_abstraction_sqlite_sink_backend \
            ./test/e2e/code-intelligence-REPO-SCANNER/...
