trigger: none

pr:
  branches:
    include:
      - main
  paths:
    include:
      - services/clean-code/**

pool:
  vmImage: ubuntu-latest

variables:
  GO_VERSION: "1.25.1"
  COMPOSE_FILE: tests/e2e/phase-08-refactor-planner/docker-compose.yml

stages:
  - stage: e2e_ml_effort_model_loader_and_version_pinning
    displayName: "E2E – ML Effort Model Loader and Version Pinning"
    jobs:
      - job: run_e2e
        displayName: "Run godog E2E tests"
        timeoutInMinutes: 20
        steps:
          - task: GoTool@0
            inputs:
              version: $(GO_VERSION)
            displayName: "Install Go $(GO_VERSION)"

          - script: |
              docker compose -f $(COMPOSE_FILE) up -d --build
            displayName: "Start compose services"
            workingDirectory: $(Build.SourcesDirectory)

          - script: |
              PG_PORT=$(docker compose -f $(COMPOSE_FILE) port postgres 5432 | cut -d: -f2)
              PLANNER_PORT=$(docker compose -f $(COMPOSE_FILE) port refactor-planner 8080 | cut -d: -f2)
              MGMT_PORT=$(docker compose -f $(COMPOSE_FILE) port mgmt-surface 8080 | cut -d: -f2)
              OTEL_PORT=$(docker compose -f $(COMPOSE_FILE) port otel-collector 4317 | cut -d: -f2)
              export CLEAN_CODE_PG_URL="postgres://postgres:postgres@localhost:${PG_PORT}/clean_code?sslmode=disable"
              export CLEAN_CODE_PLANNER_URL="http://localhost:${PLANNER_PORT}"
              export CLEAN_CODE_MGMT_URL="http://localhost:${MGMT_PORT}"
              export CLEAN_CODE_OTEL_ENDPOINT="http://localhost:${OTEL_PORT}"
              export CLEAN_CODE_ML_MODEL_VERSION="1.0.0"
              make migrate-up
              make seed-phase-08
              cd services/clean-code
              go test -tags e2e -v -count=1 ./test/e2e/code-intelligence-CLEAN-CODE/... \
                -run TestE2E_refactor_planner_ml_effort_model_loader_and_version_pinning
            displayName: "Export compose URLs, bootstrap, and run E2E tests"
            workingDirectory: $(Build.SourcesDirectory)

          - script: |
              docker compose -f $(COMPOSE_FILE) down -v --remove-orphans
            displayName: "Tear down compose services"
            workingDirectory: $(Build.SourcesDirectory)
            condition: always()