# Phase 1 E2E compose stack — postgres only.
# Qdrant and OTel collector are NOT started; Phase 1 scenarios
# exercise the AST dispatcher (in-process) and schema migration
# journal (postgres only).
#
# Usage (from repo root):
#   docker compose -f tests/e2e/phase-1-shared-additive-surfaces/docker-compose.yml up -d
#   export AGENT_MEMORY_PG_URL="postgres://agent_memory:agent_memory@localhost:5432/agent_memory?sslmode=disable"
#   cd services/agent-memory && go test -tags e2e ./test/e2e/...

services:
  postgres:
    build:
      context: ../../../services/agent-memory/deploy/local/postgres
      dockerfile: Dockerfile
    image: agent-memory/postgres:16-partman
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: agent_memory
      POSTGRES_PASSWORD: agent_memory
      POSTGRES_DB: agent_memory
    volumes:
      - ../../../services/agent-memory/deploy/local/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent_memory -d agent_memory"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s