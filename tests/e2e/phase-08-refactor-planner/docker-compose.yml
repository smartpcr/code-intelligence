# Docker Compose for Phase 08 – Refactor Planner E2E tests.
# Usage: docker compose -f tests/e2e/phase-08-refactor-planner/docker-compose.yml up -d --build

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: clean_code
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10

  refactor-planner:
    build:
      context: ../../../services/clean-code
      dockerfile: Dockerfile
      args:
        SERVICE: clean-code-metric-ingestor
        ROLE: refactor-planner
    environment:
      CLEAN_CODE_PG_URL: "postgres://postgres:postgres@postgres:5432/clean_code?sslmode=disable"
      CLEAN_CODE_OTEL_ENDPOINT: "otel-collector:4317"
      CLEAN_CODE_ALLOW_SHARED_PG_ROLE: "true"
      CLEAN_CODE_EFFORT_SOURCE: "ml"
      CLEAN_CODE_ML_MODEL_URI: "file:///models/effort_model.onnx"
      CLEAN_CODE_ML_MODEL_VERSION: "1.0.0"
    ports:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started

  mgmt-surface:
    build:
      context: ../../../services/clean-code
      dockerfile: Dockerfile
      args:
        SERVICE: clean-code-metric-ingestor
        ROLE: mgmt-surface
    environment:
      CLEAN_CODE_PG_URL: "postgres://postgres:postgres@postgres:5432/clean_code?sslmode=disable"
      CLEAN_CODE_OTEL_ENDPOINT: "otel-collector:4317"
      CLEAN_CODE_ALLOW_SHARED_PG_ROLE: "true"
    ports:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.100.0
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317"
      - "8889"