trigger:
  paths:
    - "services/agent-memory/migrations/**"
    - "services/agent-memory/internal/repoindexer/ast/**"
    - "services/agent-memory/test/e2e/code-intelligence-AST-PARSER-FOR-ADDIT/**"
    - "services/agent-memory/go.mod"
    - "services/agent-memory/go.sum"
    - "tests/e2e/phase-1-shared-additive-surfaces/**"

pr:
  paths:
    - "services/agent-memory/migrations/**"
    - "services/agent-memory/internal/repoindexer/ast/**"
    - "services/agent-memory/test/e2e/code-intelligence-AST-PARSER-FOR-ADDIT/**"


pool:
  vmImage: "ubuntu-latest"

variables:
  COMPOSE_FILE: tests/e2e/phase-1-shared-additive-surfaces/docker-compose.yml
  AGENT_MEMORY_PG_URL: "postgres://agent_memory:agent_memory@localhost:5432/agent_memory?sslmode=disable"
  GO_MOD_FILE: services/agent-memory/go.mod

steps:
  - checkout: self

  - script: |
      set -euo pipefail
      if [ ! -f "$(GO_MOD_FILE)" ]; then
        echo "##vso[task.logissue type=error]Cannot find $(GO_MOD_FILE)"
        exit 1
      fi
      # Mirror actions/setup-go's go-version-file behaviour: prefer the
      # `toolchain` directive when present, otherwise fall back to the
      # `go` directive.
      GO_VERSION=$(awk '
        /^toolchain[[:space:]]+go/ { v=$2; sub(/^go/, "", v); toolchain=v }
        /^go[[:space:]]+[0-9]/     { goline=$2 }
        END { if (toolchain) print toolchain; else print goline }
      ' "$(GO_MOD_FILE)")
      if [ -z "$GO_VERSION" ]; then
        echo "##vso[task.logissue type=error]Could not determine Go version from $(GO_MOD_FILE)"
        exit 1
      fi
      echo "Resolved Go version from $(GO_MOD_FILE): $GO_VERSION"
      echo "##vso[task.setvariable variable=GO_VERSION]$GO_VERSION"
    displayName: "Resolve Go version from go.mod"

  - task: GoTool@0
    displayName: "Set up Go"
    inputs:
      version: $(GO_VERSION)

  - script: |
      docker compose -f $(COMPOSE_FILE) up -d --build
    displayName: "Start compose stack (postgres with partman)"

  - script: |
      set -euo pipefail
      deadline=$(( $(date +%s) + 90 ))
      while :; do
        status=$(docker compose -f $(COMPOSE_FILE) ps --format json \
          | jq -r 'select(.Service=="postgres") | .Health // .State' 2>/dev/null || echo "unknown")
        echo "  postgres -> $status"
        if [ "$status" = "healthy" ]; then echo "Postgres ready"; break; fi
        if [ "$(date +%s)" -ge "$deadline" ]; then
          echo "##vso[task.logissue type=error]Postgres did not become healthy within 90s"
          docker compose -f $(COMPOSE_FILE) logs --tail=100
          exit 1
        fi
        sleep 3
      done
    displayName: "Wait for postgres"

  - script: |
      cd services/agent-memory
      go mod download
    displayName: "Download Go dependencies"

  - script: |
      cd services/agent-memory
      go test ./internal/repoindexer/ast -count=1 -v \
        -run 'TestDispatcher|TestLangMeta|TestErrParserUnavailable|TestMergeLangMeta|TestNormalizeHints|TestPass2bMultimap|TestPass2dOverrides'
    displayName: "Run dispatcher unit-test slice"
    env:
      AGENT_MEMORY_PG_URL: $(AGENT_MEMORY_PG_URL)

  - script: |
      cd services/agent-memory
      go test ./migrations -count=1 -v \
        -run 'TestMigrator_Up_AppliesAll|TestMigrations_0022_EdgeKindOverrides'
    displayName: "Run migration apply / probe test"
    env:
      AGENT_MEMORY_PG_URL: $(AGENT_MEMORY_PG_URL)

  - script: |
      cd services/agent-memory
      go test -tags e2e -v -count=1 -timeout 120s \
        -run TestE2E_shared_additive_surfaces_and_dispatcher_edits_additive_parser_go_struct_surfaces \
        ./test/e2e/code-intelligence-AST-PARSER-FOR-ADDIT/...
    displayName: "Run E2E scenarios"
    env:
      AGENT_MEMORY_PG_URL: $(AGENT_MEMORY_PG_URL)

  - script: |
      docker compose -f $(COMPOSE_FILE) down -v
    displayName: "Tear down compose stack"
    condition: always()