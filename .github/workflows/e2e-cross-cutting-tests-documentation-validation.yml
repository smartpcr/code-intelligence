name: "E2E — Cross-Cutting Tests Documentation Validation"

on:
  pull_request:
    branches:
      - feature/memory
      - "ws/code-intelligence-AST-PARSER-FOR-ADDIT/**"
    paths:
      - ".claude/context/tests.md"
      - "services/agent-memory/test/e2e/code-intelligence-AST-PARSER-FOR-ADDIT/**"
      - "tests/e2e/phase-7-cross-cutting-validation/**"
      - ".github/workflows/e2e-cross-cutting-tests-documentation-validation.yml"
  push:
    branches:
      - feature/memory
      - "ws/code-intelligence-AST-PARSER-FOR-ADDIT/**"
    paths:
      - ".claude/context/tests.md"
      - "services/agent-memory/test/e2e/code-intelligence-AST-PARSER-FOR-ADDIT/**"
      - "tests/e2e/phase-7-cross-cutting-validation/**"
      - ".github/workflows/e2e-cross-cutting-tests-documentation-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-cross-cutting-docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  documentation-support-matrix-update:
    name: "documentation-support-matrix-update"
    runs-on: ubuntu-latest
    env:
      COMPOSE_FILE: tests/e2e/phase-7-cross-cutting-validation/docker-compose.yml
      AGENT_MEMORY_PG_URL: "postgres://agent_memory:agent_memory@localhost:5432/agent_memory?sslmode=disable"
      AGENT_MEMORY_QDRANT_URL: "http://localhost:6333"
      AGENT_MEMORY_OTEL_ENDPOINT: "http://localhost:4317"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/agent-memory/go.mod
          cache: true

      - name: Start compose stack (postgres, qdrant, otel-collector)
        run: docker compose -f $COMPOSE_FILE up -d --build

      - name: Wait for postgres
        run: |
          set -euo pipefail
          deadline=$(( $(date +%s) + 90 ))
          while :; do
            status=$(docker compose -f $COMPOSE_FILE ps --format json \
              | jq -r 'select(.Service=="postgres") | .Health // .State' 2>/dev/null || echo "unknown")
            echo "  postgres -> $status"
            if [ "$status" = "healthy" ]; then echo "Postgres ready"; break; fi
            if [ "$(date +%s)" -ge "$deadline" ]; then
              echo "::error::Postgres did not become healthy within 90s"
              docker compose -f $COMPOSE_FILE logs --tail=100
              exit 1
            fi
            sleep 3
          done

      - name: Download Go dependencies
        working-directory: services/agent-memory
        run: go mod download

      - name: Run E2E scenarios
        working-directory: services/agent-memory
        run: |
          go test -tags e2e -v -count=1 -timeout 120s \
            -run TestE2E_cross_cutting_tests_documentation_validation_documentation_support_matrix_update \
            ./test/e2e/code-intelligence-AST-PARSER-FOR-ADDIT/...

      - name: Tear down compose stack
        if: always()
        run: docker compose -f $COMPOSE_FILE down -v