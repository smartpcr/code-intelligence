# Docker Compose for Phase 04 – External Metric Ingest Webhook E2E tests.
# The CLEAN_CODE_WEBHOOK_HMAC_SECRET env-var MUST be exported before
# running `docker compose up` so the webhook container receives the secret.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: clean_code
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10

  webhook:
    # Use the existing parameterised multi-service Dockerfile
    # (`services/clean-code/Dockerfile`, `ARG SERVICE` selects
    # the binary). The `webhook` container runs the
    # `clean-code-metric-ingestor` binary, which hosts the
    # production `/v1/ingest/{verb}` Router when
    # `CLEAN_CODE_ENABLE_EXTERNAL_INGEST_WEBHOOK=true`
    # (otherwise it serves the legacy HMAC-only path).
    # Mirrors the proven phase-03 build shape at
    # `tests/e2e/phase-03-indexer-ingestor/docker-compose.yml:30-49`.
    build:
      context: ../../../services/clean-code
      dockerfile: Dockerfile
      args:
        SERVICE: clean-code-metric-ingestor
        ROLE: webhook
    environment:
      CLEAN_CODE_PG_URL: "postgres://postgres:postgres@postgres:5432/clean_code?sslmode=disable"
      CLEAN_CODE_WEBHOOK_HMAC_SECRET: "${CLEAN_CODE_WEBHOOK_HMAC_SECRET}"
      CLEAN_CODE_OTEL_ENDPOINT: "otel-collector:4317"
      # Backward-compatible passthroughs for the Stage-6
      # secret-resolver Router. Sibling jobs (defects /
      # coverage / test_balance / webhook_transport) do NOT
      # export these vars on the host shell, so they pass
      # through as empty strings; the config loader at
      # `internal/config/config.go:720` treats `ok && v != ""`
      # as the only set-condition, so empty = unset = legacy
      # router (siblings unchanged). The churn job DOES
      # export both vars before compose-up to mount the
      # production Router.
      CLEAN_CODE_ENABLE_EXTERNAL_INGEST_WEBHOOK: "${CLEAN_CODE_ENABLE_EXTERNAL_INGEST_WEBHOOK:-}"
      CLEAN_CODE_WEBHOOK_SIGNING_KEY_ID: "${CLEAN_CODE_WEBHOOK_SIGNING_KEY_ID:-}"
      # Management-role DB opt-in for E2E. The metric-ingestor
      # binary at `cmd/clean-code-metric-ingestor/main.go:112-115`
      # calls `openMgmtDB`, which refuses to boot unless either
      # CLEAN_CODE_MGMT_PG_URL is set OR
      # CLEAN_CODE_ALLOW_SHARED_PG_ROLE=true (see `main.go:278-315`,
      # esp. the WARN at 295-303 that names "INTENDED for local
      # dev / E2E ONLY"). The compose file boots a single
      # postgres container with one role, so we opt the
      # ingestor handle to be re-used for the management role
      # too. This is the documented E2E shared-role path; the
      # binary logs a WARN naming both env vars at boot.
      CLEAN_CODE_ALLOW_SHARED_PG_ROLE: "true"
    ports:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started

  ingestor:
    # Same binary, different role -- this container serves the
    # internal `/v1/ingestor/process` + `/v1/ingestor/scan-run`
    # routes (the materialiser-facing side). See
    # `cmd/clean-code-metric-ingestor/main.go:397-398`.
    build:
      context: ../../../services/clean-code
      dockerfile: Dockerfile
      args:
        SERVICE: clean-code-metric-ingestor
        ROLE: ingestor
    environment:
      CLEAN_CODE_PG_URL: "postgres://postgres:postgres@postgres:5432/clean_code?sslmode=disable"
      CLEAN_CODE_OTEL_ENDPOINT: "otel-collector:4317"
      # Same management-role opt-in as the webhook service --
      # the binary's `openMgmtDB` gate fires regardless of which
      # routes the container exposes (the mgmt.* write verbs
      # are mounted unconditionally at startup).
      CLEAN_CODE_ALLOW_SHARED_PG_ROLE: "true"
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.100.0
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317"
      - "8889"
