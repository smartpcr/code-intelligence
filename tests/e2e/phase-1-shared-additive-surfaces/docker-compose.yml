# Phase 1 — Shared Additive Surfaces E2E compose stack.
#
# Services started: postgres only — the partman-enabled image built from
# services/agent-memory/deploy/local/postgres/Dockerfile. Qdrant and the
# OTel collector are NOT started; Phase 1 scenarios exercise the AST
# dispatcher (in-process) and the schema migration journal (postgres only).
#
# Usage (from repo root):
#   docker compose -f tests/e2e/phase-1-shared-additive-surfaces/docker-compose.yml up -d
#   export AGENT_MEMORY_PG_URL="postgres://agent_memory:agent_memory@localhost:5432/agent_memory?sslmode=disable"
#   cd services/agent-memory
#   go test -tags e2e ./test/e2e/code-intelligence-AST-PARSER-FOR-ADDIT/...

name: phase-1-shared-additive-surfaces

services:
  postgres:
    container_name: phase1_postgres
    build:
      context: ../../../services/agent-memory/deploy/local/postgres
      dockerfile: Dockerfile
    image: agent-memory/postgres:16-partman
    restart: "no"
    environment:
      POSTGRES_USER: agent_memory
      POSTGRES_PASSWORD: agent_memory
      POSTGRES_DB: agent_memory
      PG_PARTMAN_BGW_DBNAME: agent_memory
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=pg_partman_bgw"
      - "-c"
      - "pg_partman_bgw.dbname=agent_memory"
      - "-c"
      - "pg_partman_bgw.interval=3600"
      - "-c"
      - "pg_partman_bgw.role=agent_memory"
    ports:
      - "5432:5432"
    volumes:
      - ../../../services/agent-memory/deploy/local/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent_memory -d agent_memory"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s