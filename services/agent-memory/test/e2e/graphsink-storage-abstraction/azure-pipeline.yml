trigger:
  paths:
    - "services/agent-memory/internal/graphsink/**"
    - "services/agent-memory/test/e2e/code-intelligence-REPO-SCANNER/graphsink_storage_abstraction_*"
    - "tests/e2e/phase-3-graphsink-storage-abstraction/**"

pr:
  paths:
    - "services/agent-memory/internal/graphsink/**"
    - "services/agent-memory/test/e2e/code-intelligence-REPO-SCANNER/graphsink_storage_abstraction_*"

pool:
  vmImage: "ubuntu-latest"

variables:
  COMPOSE_FILE: tests/e2e/phase-3-graphsink-storage-abstraction/docker-compose.yml
  AGENT_MEMORY_PG_URL: "postgres://agent_memory:agent_memory@localhost:5432/agent_memory?sslmode=disable"

steps:
  - checkout: self

  - task: GoTool@0
    displayName: "Set up Go"
    inputs:
      version: "1.25"

  - script: |
      docker compose -f $(COMPOSE_FILE) up -d
    displayName: "Start compose stack (postgres)"

  - script: |
      set -euo pipefail
      deadline=$(( $(date +%s) + 90 ))
      while :; do
        status=$(docker compose -f $(COMPOSE_FILE) ps --format json \
          | jq -r 'select(.Service=="postgres") | .Health // .State' 2>/dev/null || echo "unknown")
        echo "  postgres -> $status"
        if [ "$status" = "healthy" ]; then echo "Postgres ready"; break; fi
        if [ "$(date +%s)" -ge "$deadline" ]; then
          echo "##vso[task.logissue type=error]Postgres did not become healthy within 90s"
          docker compose -f $(COMPOSE_FILE) logs --tail=100
          exit 1
        fi
        sleep 3
      done
    displayName: "Wait for postgres"

  - script: |
      cd services/agent-memory
      go mod download
    displayName: "Download Go dependencies"

  - script: |
      cd services/agent-memory
      go test -tags e2e -v -count=1 -timeout 120s \
        -run TestE2E_graphsink_storage_abstraction_sink_interface_skeleton \
        ./test/e2e/code-intelligence-REPO-SCANNER/...
    displayName: "Run E2E scenarios — sink-interface-skeleton"
    env:
      AGENT_MEMORY_PG_URL: $(AGENT_MEMORY_PG_URL)

  - script: |
      cd services/agent-memory
      go test -tags e2e -v -count=1 -timeout 120s \
        -run TestE2E_graphsink_storage_abstraction_repoid_extension_to_repoinput \
        ./test/e2e/code-intelligence-REPO-SCANNER/...
    displayName: "Run E2E scenarios — repoid-extension-to-repoinput"
    env:
      AGENT_MEMORY_PG_URL: $(AGENT_MEMORY_PG_URL)

  - script: |
      cd services/agent-memory
      CGO_ENABLED=1 go test -tags e2e -v -count=1 -timeout 120s \
        -run TestE2E_graphsink_storage_abstraction_sqlite_sink_backend \
        ./test/e2e/code-intelligence-REPO-SCANNER/...
    displayName: "Run E2E scenarios — sqlite-sink-backend"

  - script: |
      cd services/agent-memory
      go test -tags e2e -v -count=1 -timeout 120s \
        -run TestE2E_graphsink_storage_abstraction_memory_sink_and_json_export \
        ./test/e2e/code-intelligence-REPO-SCANNER/...
    displayName: "Run E2E scenarios — memory-sink-and-json-export"
    condition: succeededOrFailed()

  - script: |
      cd services/agent-memory
      CGO_ENABLED=1 go test -tags e2e -v -count=1 -timeout 120s \
        -run TestE2E_graphsink_storage_abstraction_memory_reader_adapter \
        ./test/e2e/code-intelligence-REPO-SCANNER/...
    displayName: "Run E2E scenarios — memory-reader-adapter"
    condition: succeededOrFailed()

  - script: |
      cd services/agent-memory
      go test -tags e2e -v -count=1 -timeout 180s \
        -run TestE2E_graphsink_storage_abstraction_postgres_sink_adapter \
        ./test/e2e/code-intelligence-REPO-SCANNER/...
    displayName: "Run E2E scenarios — postgres-sink-adapter"
    env:
      AGENT_MEMORY_PG_URL: $(AGENT_MEMORY_PG_URL)
    condition: succeededOrFailed()

  - script: |
      cd services/agent-memory
      CGO_ENABLED=1 go test -tags e2e -v -count=1 -timeout 300s \
        -run TestE2E_graphsink_storage_abstraction_sqlite_reader_adapter \
        ./test/e2e/code-intelligence-REPO-SCANNER/...
    displayName: "Run E2E scenarios — sqlite-reader-adapter"
    condition: succeededOrFailed()

  - script: |
      cd services/agent-memory
      go test -tags e2e -v -count=1 -timeout 180s \
        -run TestE2E_graphsink_storage_abstraction_backend_parity_golden_test \
        ./test/e2e/code-intelligence-REPO-SCANNER/...
    displayName: "Run E2E scenarios — backend-parity-golden-test"
    env:
      AGENT_MEMORY_PG_URL: $(AGENT_MEMORY_PG_URL)
    condition: succeededOrFailed()

  - script: |
      docker compose -f $(COMPOSE_FILE) down -v
    displayName: "Tear down compose stack"
    condition: always()
